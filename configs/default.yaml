# Darwin – default system configuration
# All values can be overridden via environment variables or CLI flags.

model:
  vocab_size: 32000
  max_seq_len: 2048
  n_layers: 12
  n_heads: 8
  n_kv_heads: 8
  d_model: 512
  d_ff: 2048
  dropout: 0.1

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  batch_size: 32
  warmup_steps: 2000
  max_steps: 100000
  save_every: 1000
  eval_every: 500
  output_dir: data/checkpoints

# Self-improvement loop
improvement_interval_seconds: 3600   # run every hour
max_parallel_agents: 4
proposal_budget: 10

# Safety
max_code_execution_time_seconds: 30
allow_network_in_sandbox: false
require_human_review_above_risk: 0.7

# Enabled domain agents
enabled_domains:
  - code
  - art
  - video
  - prompting
  - research

# Paths (all local – no cloud storage)
data_dir: data
log_dir: data/logs
